<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Withdrawal History | Copy Trader</title>
  <link rel="icon" type="image/png" href="assets/images/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="withdraw-body" data-page="mine" data-title-key="meta.withdrawHistoryTitle">
  <main class="page-shell withdraw-reference-shell transfer-history-shell">
    <section class="withdraw-ref-card transfer-history-card">
      <div class="transfer-history-top">
        <div>
          <h1 data-i18n="withdrawHistory.title">Withdrawal History</h1>
          <p data-i18n="withdrawHistory.subtitle">Track your USDT BEP20 withdrawal requests, submitted amount, fee, net amount, and request status.</p>
        </div>
        <a class="transfer-back-link" href="transfer.html"><i class="fa-solid fa-arrow-left"></i> <span data-i18n="withdrawHistory.backToWithdraw">Back to Withdraw</span></a>
      </div>

      <div class="transfer-history-table" id="withdrawHistoryList" aria-live="polite">
        <div class="transfer-history-row head">
          <span data-i18n="withdrawHistory.table.date">Date</span>
          <span data-i18n="withdrawHistory.table.amount">Amount</span>
          <span data-i18n="withdrawHistory.table.fee">Fee</span>
          <span data-i18n="withdrawHistory.table.netReceive">Net Receive</span>
          <span data-i18n="withdrawHistory.table.status">Status</span>
        </div>
        <div class="transfer-empty-state">
          <i class="fa-solid fa-clock-rotate-left"></i>
          <p data-i18n="withdrawHistory.empty">No withdrawal requests yet.</p>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Primary navigation" data-i18n-aria-label="nav.primaryAria">
    <a class="nav-link" data-nav="about" href="about.html"><i class="fa-solid fa-circle-info"></i><span data-i18n="nav.about">About</span></a>
    <a class="nav-link" data-nav="team" href="team.html"><i class="fa-solid fa-people-group"></i><span data-i18n="nav.team">Team</span></a>
    <a class="nav-link" data-nav="copy" href="copy.html"><i class="fa-solid fa-copy"></i><span data-i18n="nav.copy">Copy</span></a>
    <a class="nav-link" data-nav="dashboard" href="dashboard.html"><i class="fa-solid fa-gauge-high"></i><span data-i18n="nav.dashboard">Dashboard</span></a>
    <a class="nav-link" data-nav="mine" href="#mine-menu" role="button"><i class="fa-solid fa-user-gear"></i><span data-i18n="nav.mine">Mine</span></a>
  </nav>

  <script src="assets/js/translations.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
