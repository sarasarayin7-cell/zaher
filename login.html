<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Copy Trader</title>
  <link rel="icon" type="image/png" href="assets/images/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="auth-body" data-page="login" data-title-key="meta.loginTitle">
  <main class="auth-wrap auth-single">
    <a class="brand auth-top-brand" href="index.html" aria-label="Copy Trader home" data-i18n-aria-label="login.brandAria">
      <span class="brand-mark"><img src="assets/images/copy-trader-mark.png" alt="Copy Trader logo" class="brand-logo-img"></span>
      <span><span class="brand-title">Copy Trader</span><span class="brand-subtitle" data-i18n="login.brandSubtitle">Secure trading dashboard</span></span>
    </a>

    <section class="card auth-panel">
      <span class="pill" data-i18n-html="login.memberAccess"><i class="fa-solid fa-right-to-bracket"></i> Member access</span>
      <h2 class="small-title" style="margin-top:18px;" data-i18n="login.formTitle">Login</h2>
      <p class="section-subtitle" data-i18n="login.formSubtitle">Select phone or email according to the account you created before.</p>

      <div class="tabs" data-tabs="login-method">
        <button class="tab-btn active" type="button" data-tab="phone" data-i18n-html="login.tab.phone"><i class="fa-solid fa-mobile-screen"></i> Phone</button>
        <button class="tab-btn" type="button" data-tab="email" data-i18n-html="login.tab.email"><i class="fa-solid fa-envelope"></i> Email</button>
      </div>

      <form class="form-panel active" data-tab-panel-group="login-method" data-tab-panel="phone" data-login-form="phone">
        <div class="form-grid">
          <div class="field"><label data-i18n="login.phoneNumber">Phone number</label><div class="input-wrap"><i class="fa-solid fa-phone"></i><input name="contact" type="tel" placeholder="Phone number" data-i18n-placeholder="login.placeholder.phone" autocomplete="tel" data-phone-input required></div></div>
          <div class="field"><label data-i18n="login.password">Password</label><div class="input-wrap"><i class="fa-solid fa-lock"></i><input name="password" type="password" minlength="8" placeholder="Enter password" data-i18n-placeholder="login.placeholder.password" autocomplete="current-password" required></div></div>
          <div class="login-options"><label class="remember-option"><input type="checkbox" name="rememberLogin" data-remember-login> <span data-i18n="login.rememberMe">Remember login details</span></label><a class="forgot-link" href="forgot-password.html" data-i18n="login.forgotPassword">Forgot password?</a></div>
          <button class="btn full" type="submit" data-i18n-html="login.button.submit"><i class="fa-solid fa-arrow-right-to-bracket"></i> Login</button>
          <p class="status-message" aria-live="polite"></p>
        </div>
      </form>

      <form class="form-panel" data-tab-panel-group="login-method" data-tab-panel="email" data-login-form="email">
        <div class="form-grid">
          <div class="field"><label data-i18n="login.emailAddress">Email address</label><div class="input-wrap"><i class="fa-solid fa-envelope"></i><input name="contact" type="email" placeholder="Enter email address" data-i18n-placeholder="login.placeholder.email" autocomplete="email"></div></div>
          <div class="field"><label data-i18n="login.password">Password</label><div class="input-wrap"><i class="fa-solid fa-lock"></i><input name="password" type="password" minlength="8" placeholder="Enter password" data-i18n-placeholder="login.placeholder.password" autocomplete="current-password" required></div></div>
          <div class="login-options"><label class="remember-option"><input type="checkbox" name="rememberLogin" data-remember-login> <span data-i18n="login.rememberMe">Remember login details</span></label><a class="forgot-link" href="forgot-password.html" data-i18n="login.forgotPassword">Forgot password?</a></div>
          <button class="btn full" type="submit" data-i18n-html="login.button.submit"><i class="fa-solid fa-arrow-right-to-bracket"></i> Login</button>
          <p class="status-message" aria-live="polite"></p>
        </div>
      </form>
      <div class="auth-actions"><span class="muted" data-i18n="login.needAccount">Need a new account?</span><a class="btn ghost" href="register.html" data-i18n="login.createAccount">Create account</a></div>
    </section>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
  <script src="assets/js/translations.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
